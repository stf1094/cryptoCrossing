version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Bundle only minor + patch bumps into one PR — these are low-risk.
      # Major bumps are left OUT of the group so they arrive as separate,
      # individually reviewable PRs; that way one breaking major can't block
      # the whole batch (as the @reduxjs/toolkit v2 conflict did).
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Portfolio project: skip ALL major-version bumps to keep the repo quiet.
      # The grouped minor/patch PR above and any security fixes still come
      # through; do majors manually if/when you choose. (This also covers the
      # @reduxjs/toolkit v2 conflict with reduxjs-toolkit-persist@7's RTK v1
      # peer requirement.)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # keep the GitHub Actions used in CI up to date, grouped together
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
