name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        # Placeholder Firebase values — this job only verifies the build compiles,
        # it does not deploy. Firebase's init requires these vars to be present
        # (an empty API key throws auth/invalid-api-key while prerendering).
        # Real credentials live in Vercel; these are non-secret dummies.
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ci-dummy-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-dummy
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
